<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>AudienceW | لوحة الإدارة الداخلية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f4;--surface:#fff;--ink:#17211b;--muted:#66756c;--line:#dfe7df;--brand:#136f63;--brand-dark:#0d4f47;--accent:#c77d2d;--danger:#c24155;--shadow:0 18px 45px rgba(23,33,27,.1)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Tajawal,system-ui,sans-serif}button,input{font:inherit}.shell{min-height:100vh;display:grid;grid-template-columns:250px minmax(0,1fr)}
.rail{background:#15231d;color:#d9e5dd;padding:18px 14px;display:flex;flex-direction:column;gap:18px}.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:22px;color:#fff}.logo-mark{width:34px;height:34px;border-radius:8px;background:#fff;display:grid;place-items:center;overflow:hidden}.logo-mark img{width:100%;height:100%;object-fit:contain;display:block}
.rail a{color:#d9e5dd;text-decoration:none;font-weight:800;padding:11px 12px;border-radius:8px;background:rgba(255,255,255,.08)}.rail p{line-height:1.7;color:#aebdb4;margin:0}.main{overflow:auto}.head{height:74px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 22px;position:sticky;top:0}.head h1{font-size:24px;margin:0}.btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:10px 14px;font-weight:800;cursor:pointer}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.body{padding:20px;display:grid;gap:18px}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}.stat,.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 8px 20px rgba(23,33,27,.04)}.stat span{display:block;color:var(--muted);font-weight:800;font-size:13px}.stat b{display:block;font-size:28px;margin-top:6px}.grid{display:grid;grid-template-columns:1.3fr .7fr;gap:18px}.panel h2{font-size:19px;margin:0 0 12px}.table{overflow:auto;border:1px solid var(--line);border-radius:8px}.table table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{text-align:right;padding:13px;border-bottom:1px solid #edf2ef;vertical-align:top}.table th{font-size:13px;color:#64756b;background:#f7faf6}.pill{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#e7f7ee;color:#0e5d51;white-space:nowrap}.pill.orange{background:#fff2dc;color:#a05212}.plan{border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;background:#fbfdfb}.plan b{font-size:18px}.plan p{color:var(--muted);line-height:1.6;margin:6px 0 0}.toast{position:fixed;bottom:18px;left:18px;background:#14231d;color:#fff;padding:12px 16px;border-radius:8px;display:none}.toast.show{display:block}
@media(max-width:1050px){.shell{grid-template-columns:1fr}.stats,.grid{grid-template-columns:1fr}.rail{position:static}.head{position:static}}
</style>
</head>
<body>
<div class="shell">
  <aside class="rail">
    <div class="logo"><span class="logo-mark"><img src="assets/audiencew-logo.png" alt=""></span>AudienceW Admin</div>
    <a href="/">العودة لمنصة العميل</a>
    <p>لوحة داخلية غير مرتبطة بتنقل العميل. لاحقا تربط بتسجيل دخول وصلاحية owner/admin فقط.</p>
  </aside>
  <main class="main">
    <header class="head">
      <h1>لوحة الإدارة الداخلية</h1>
      <span style="flex:1"></span>
      <button class="btn primary" id="refreshBtn">تحديث</button>
    </header>
    <div class="body">
      <section class="stats" id="adminStats"></section>
      <section class="grid">
        <div class="panel">
          <h2>العملاء المشتركين والتجارب</h2>
          <div class="table" id="tenantsTable"></div>
        </div>
        <div class="panel">
          <h2>الباقات</h2>
          <div id="plansList"></div>
        </div>
      </section>
      <section class="panel">
        <h2>طلبات التجربة والاشتراك</h2>
        <div class="table" id="trialRequestsTable"></div>
      </section>
      <section class="panel">
        <h2>مراقبة داخلية</h2>
        <div class="table" id="usageTable"></div>
      </section>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="/admin.js"></script>
</body>
</html>
